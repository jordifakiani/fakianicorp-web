<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fakiani Corp</title>
    <meta
      name="description"
      content="Fakiani Corp is currently under development."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.7;
        color: #f7ead7;
        background:
          radial-gradient(circle at 20% 20%, rgba(198, 116, 42, 0.24), transparent 45%),
          radial-gradient(circle at 80% 80%, rgba(140, 68, 28, 0.28), transparent 42%),
          linear-gradient(135deg, #17100c, #26180f 45%, #120d0a);
      }

      main {
        max-width: 880px;
      }

      p {
        margin: 0;
        font-size: clamp(1.05rem, 2vw, 1.35rem);
      }
    </style>
  </head>
  <body>
    <main>
      <p>
        Fakiani Corp is currently under development. We are hard at work behind
        the scenes, refining a vision designed to challenge the status quo and
        deliver impactful solutions. Exciting updates are on the horizon—stay
        tuned as we prepare to share our journey and the roadmap for what’s
        next.
      </p>
    </main>
  </body>
</html>
